<script language="JavaScript">
function setText(id, text, cls) {
  var el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = text;
  el.className = cls || '';
}

function fetchStatus() {
  var xhr = (window.XMLHttpRequest)
    ? new XMLHttpRequest()
    : new ActiveXObject('Microsoft.XMLHTTP');

  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status !== 200) {
      setText('ps-connected', 'Unable to retrieve status', 'ps-err');
      return;
    }
    var s;
    try { s = JSON.parse(xhr.responseText); } catch(e) { return; }

    /* Connection */
    if (s.connected) {
      setText('ps-connected', 'Connected', 'ps-ok');
    } else {
      setText('ps-connected', 'Not connected', 'ps-err');
      setText('ps-state',  '&#8212;', '');
      setText('ps-paper',  '&#8212;', '');
      setText('ps-error',  '&#8212;', '');
      setText('ps-jobs',   String(s.jobs_printed), '');
      setText('ps-bytes',  String(s.bytes_sent), '');
      setText('ps-devid',  '&#8212;', '');
      return;
    }

    /* State */
    if (s.error) {
      setText('ps-state', 'Error', 'ps-err');
    } else if (s.busy) {
      setText('ps-state', 'Printing', 'ps-ok');
    } else if (!s.online) {
      setText('ps-state', 'Offline', 'ps-warn');
    } else {
      setText('ps-state', 'Ready', 'ps-ok');
    }

    /* Paper */
    setText('ps-paper', s.paper_empty ? 'Paper Empty' : 'OK',
            s.paper_empty ? 'ps-err' : 'ps-ok');

    /* Error flag */
    setText('ps-error', s.error ? 'Yes' : 'No',
            s.error ? 'ps-err' : 'ps-ok');

    /* Counters */
    setText('ps-jobs',  String(s.jobs_printed), '');
    setText('ps-bytes', String(s.bytes_sent),   '');

    /* Device ID */
    setText('ps-devid', s.device_id ? s.device_id : '(not available)', '');
  };

  xhr.open('GET', '/api/printer_status', true);
  xhr.send(null);
}

/* Auto-refresh every 5 seconds */
fetchStatus();
setInterval(fetchStatus, 5000);
</script>
