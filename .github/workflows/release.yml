name: Release Firmware

"on":
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Build GPSU21 firmware (FreeRTOS)
    runs-on: ubuntu-latest

    env:
      # MIPS little-endian cross-toolchain prefix
      CROSS_COMPILE: mipsel-linux-gnu-
      # Output firmware image path
      FW_OUT: firmware/build/gpsu21_freertos.bin
      # FreeRTOS-Kernel version to download
      FREERTOS_VERSION: "V10.6.2"
      # lwIP version to download
      LWIP_VERSION: "STABLE-2_2_0_RELEASE"
      # HP LaserJet 1020/1015/1022 EZ-USB firmware blob (downloaded at build time,
      # NOT committed to the repository — HP-proprietary binary).
      # Source: foo2zjs mirror hosted on GitHub (publicly available for 15+ years).
      HP1020_FW_URL: "https://raw.githubusercontent.com/inveneo/hub-linux-ubuntu/master/install/overlay/usr/share/foo2zjs/firmware/sihp1020.dl"
      HP1020_FW_PATH: "/tmp/sihp1020.dl"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # ── Toolchain & build prerequisites ──────────────────────────────────
      - name: Install MIPS cross-compiler and build prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-mipsel-linux-gnu \
            g++-mipsel-linux-gnu \
            binutils-mipsel-linux-gnu

      # ── MIPS soft-float stub header ───────────────────────────────────────
      # gcc-mipsel-linux-gnu with -msoft-float requires gnu/stubs-o32_soft.h
      # which is not shipped by libc6-dev-mipsel-cross.  Create a stub.
      - name: Create missing MIPS o32 soft-float stub header
        run: |
          STUBS_DIR="/usr/mipsel-linux-gnu/include/gnu"
          STUBS_FILE="$STUBS_DIR/stubs-o32_soft.h"
          if [ ! -f "$STUBS_FILE" ]; then
            sudo mkdir -p "$STUBS_DIR"
            printf '/* Stub: not used in bare-metal builds */\n' \
              | sudo tee "$STUBS_FILE" > /dev/null
            echo "Created $STUBS_FILE"
          fi

      # ── FreeRTOS-Kernel ───────────────────────────────────────────────────
      - name: Cache FreeRTOS-Kernel
        id: freertos-cache
        uses: actions/cache@v4
        with:
          path: freertos-kernel
          key: freertos-kernel-${{ env.FREERTOS_VERSION }}

      - name: Download FreeRTOS-Kernel
        if: steps.freertos-cache.outputs.cache-hit != 'true'
        run: |
          curl -fL \
            "https://github.com/FreeRTOS/FreeRTOS-Kernel/archive/refs/tags/${{ env.FREERTOS_VERSION }}.tar.gz" \
            -o /tmp/freertos-kernel.tar.gz
          mkdir -p freertos-kernel-extract
          tar -xzf /tmp/freertos-kernel.tar.gz -C freertos-kernel-extract
          # Rename the extracted versioned directory to a stable name
          mv freertos-kernel-extract/FreeRTOS-Kernel-* freertos-kernel
          rm -rf freertos-kernel-extract /tmp/freertos-kernel.tar.gz

      # ── lwIP ─────────────────────────────────────────────────────────────
      - name: Cache lwIP
        id: lwip-cache
        uses: actions/cache@v4
        with:
          path: lwip
          key: lwip-${{ env.LWIP_VERSION }}

      - name: Download lwIP
        if: steps.lwip-cache.outputs.cache-hit != 'true'
        run: |
          curl -fL \
            "https://github.com/lwip-tcpip/lwip/archive/refs/tags/${{ env.LWIP_VERSION }}.tar.gz" \
            -o /tmp/lwip.tar.gz
          mkdir -p lwip-extract
          tar -xzf /tmp/lwip.tar.gz -C lwip-extract
          mv lwip-extract/lwip-* lwip
          rm -rf lwip-extract /tmp/lwip.tar.gz

      # ── HP LaserJet 1020/1015/1022 EZ-USB firmware ───────────────────────
      # Download the HP LJ 1020 firmware blob from a public GitHub mirror of
      # the foo2zjs project.  The binary is HP-proprietary and is NOT stored
      # in this repository; it is fetched at build time and baked into the
      # firmware image via the HP1020_FW make variable so that the released
      # binary supports HP LJ 1015/1020/1022 out of the box with no manual
      # user setup required.
      #
      # If the download fails (e.g. the mirror is taken down) the build
      # continues WITHOUT the blob — the print server will still work, but HP
      # LJ 1015/1020/1022 users will need to upload the firmware manually via
      # the web interface (Option D in COMPATIBILITY.md).
      - name: Download HP LaserJet 1020 firmware blob (sihp1020.dl)
        id: hp1020_fw
        run: |
          echo "Downloading HP LJ 1020 firmware from public foo2zjs mirror…"
          if curl -fsSL --connect-timeout 15 --max-time 60 \
                  -o "$HP1020_FW_PATH" "$HP1020_FW_URL"; then
            BYTES="$(wc -c < "$HP1020_FW_PATH")"
            if [ "$BYTES" -lt 1024 ]; then
              echo "::warning::Downloaded file is too small (${BYTES} bytes) — skipping blob bake-in."
              rm -f "$HP1020_FW_PATH"
              echo "available=false" >> "$GITHUB_OUTPUT"
            else
              echo "Downloaded ${BYTES} bytes → $HP1020_FW_PATH"
              echo "available=true"  >> "$GITHUB_OUTPUT"
            fi
          else
            echo "::warning::Could not download HP LJ 1020 firmware blob — building without it."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build FreeRTOS firmware
        run: |
          # Build with HP LJ 1020 firmware baked in if the blob was downloaded
          if [ "${{ steps.hp1020_fw.outputs.available }}" = "true" ]; then
            echo "Building with HP LJ 1020/1015/1022 firmware baked in (HP1020_FW=$HP1020_FW_PATH)"
            make -C firmware \
              CROSS_COMPILE="$CROSS_COMPILE" \
              FREERTOS_DIR="$GITHUB_WORKSPACE/freertos-kernel" \
              LWIP_DIR="$GITHUB_WORKSPACE/lwip" \
              HP1020_FW="$HP1020_FW_PATH"
          else
            echo "Building WITHOUT HP LJ 1020/1015/1022 firmware (blob unavailable)"
            make -C firmware \
              CROSS_COMPILE="$CROSS_COMPILE" \
              FREERTOS_DIR="$GITHUB_WORKSPACE/freertos-kernel" \
              LWIP_DIR="$GITHUB_WORKSPACE/lwip"
          fi

      # ── Verification ──────────────────────────────────────────────────────
      - name: Verify firmware image structure and checksums
        run: |
          python3 - <<'PYEOF'
          import struct, zlib, lzma, sys, os

          fw_path = os.environ["FW_OUT"]
          with open(fw_path, "rb") as f:
              fw = f.read()

          # ZOT header magic
          magic = struct.unpack_from("<I", fw, 4)[0]
          assert magic == 0xb25a4758, f"Bad ZOT magic: {magic:#010x}"

          # U-Boot uImage magic
          uimage_magic = struct.unpack_from(">I", fw, 0x100)[0]
          assert uimage_magic == 0x27051956, f"Bad uImage magic: {uimage_magic:#010x}"

          # ZOT header checksum: ~CRC32(fw[4:])
          stored   = struct.unpack_from("<I", fw, 0)[0]
          computed = zlib.crc32(fw[4:]) ^ 0xFFFFFFFF
          assert stored == computed & 0xFFFFFFFF, \
              f"ZOT CRC mismatch: stored={stored:#010x} computed={computed & 0xFFFFFFFF:#010x}"

          # uImage header CRC
          hdr = bytearray(fw[0x100:0x140])
          stored_hcrc = struct.unpack_from(">I", hdr, 4)[0]
          struct.pack_into(">I", hdr, 4, 0)
          computed_hcrc = zlib.crc32(bytes(hdr)) & 0xFFFFFFFF
          assert stored_hcrc == computed_hcrc, \
              f"uImage header CRC mismatch: {stored_hcrc:#010x} vs {computed_hcrc:#010x}"

          # uImage load address must match OEM firmware (upgrade validator checks this)
          load_addr = struct.unpack_from(">I", fw, 0x110)[0]
          assert load_addr == 0x80500000, \
              f"uImage load_addr wrong: {load_addr:#010x} (expected 0x80500000)"

          # ZOT header: product identifier fields
          # 0x0C–0x0D: OEM product code LE uint16 (e.g. 9034 → bytes 0x4A 0x23 = "J#")
          # 0x0E–0x12: hardware model string "MPS56" (null-terminated)
          # Without these the GPSU21 bootloader refuses to boot the image.
          oem_code = struct.unpack_from("<H", fw, 0x0C)[0]
          assert oem_code == 9034, \
              f"ZOT OEM product code wrong: {oem_code} (expected 9034)"
          model_id = fw[0x0E:0x13].rstrip(b"\x00").decode("latin-1")
          assert model_id == "MPS56", \
              f"ZOT hardware model ID wrong: {model_id!r} (expected 'MPS56')"

          # Firmware version string
          ver = fw[0x28:0x5b].rstrip(b"\x00").decode("latin-1")
          assert ver.startswith("MT7688-"), f"Unexpected version string: {ver!r}"

          # LZMA payload decompresses
          raw = lzma.decompress(fw[0x4AC0:])

          print(f"OK  {len(fw):,} bytes  version={ver}  decompressed={len(raw):,} bytes")
          PYEOF

      # ── Release ───────────────────────────────────────────────────────────
      - name: Determine release tag
        id: tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DATE="$(date -u +'%Y%m%d')"
          echo "tag=firmware-${DATE}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "name=Firmware build ${DATE} (${SHORT_SHA})" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            ## Firmware release (built with FreeRTOS)

            | File | Device | CPU | RTOS |
            |------|--------|-----|------|
            | `gpsu21_freertos.bin` | IOGear GPSU21 | MediaTek MT7688 (MIPS32r2) | FreeRTOS V10.6.2 |

            ### HP LaserJet 1015 / 1020 / 1022 — works out of the box

            This firmware image includes the HP LaserJet 1020 EZ-USB firmware
            blob baked in (downloaded at build time from the public foo2zjs mirror
            hosted on GitHub).  The print server automatically uploads it to any
            HP LJ 1015, 1020 or 1022 at power-on — **no manual steps required**.

            > The HP LJ 1020 firmware binary is HP-proprietary and is not stored
            > in this repository.  It is fetched during the CI build from a
            > long-standing public mirror and included in the release image only.

            ### What changed from eCos

            eCos RTOS was replaced with **FreeRTOS** to eliminate long-standing
            compilation errors and maintenance burden.  The networking stack
            (lwIP 2.2.0) and all print-server protocols (HTTP, IPP, LPR, mDNS,
            raw TCP) are unchanged in behaviour.

            ### Components

            | Component | Version | Role |
            |-----------|---------|------|
            | FreeRTOS-Kernel | V10.6.2 | Scheduler, tasks, semaphores |
            | lwIP | STABLE-2.2.0 | TCP/IP stack, socket API |
            | MT7688 BSP | in-repo | Startup, UART, exception vectors |

            Built from commit ${{ github.sha }}.
          files: |
            firmware/build/gpsu21_freertos.bin
          fail_on_unmatched_files: true
