name: Release Firmware

"on":
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Build and publish firmware release
    runs-on: ubuntu-latest

    env:
      PS1206U_BIN: PS-1206U_v8.8.bin
      GPSU21_ZIP: MPS56_90956F_9034_20191119.zip
      GPSU21_WEB: gpsu21_web
      GPSU21_OUT: GPSU21_modified.bin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Rebuild the GPSU21 firmware from the web sources in gpsu21_web/
      - name: Build modified GPSU21 firmware
        run: |
          python3 tools/repack_gpsu21.py \
            "$GPSU21_ZIP" \
            "$GPSU21_WEB" \
            "$GPSU21_OUT"

      - name: Verify firmware files exist
        run: |
          missing=0
          for f in "$PS1206U_BIN" "$GPSU21_OUT"; do
            if [ ! -f "$f" ]; then
              echo "ERROR: expected firmware file not found: $f"
              missing=1
            else
              echo "OK: $f ($(stat -c%s "$f") bytes)"
            fi
          done
          [ "$missing" -eq 0 ] || exit 1

      - name: Determine release tag
        id: tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DATE="$(date -u +'%Y%m%d')"
          echo "tag=firmware-${DATE}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "name=Firmware build ${DATE} (${SHORT_SHA})" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            ## Firmware release

            | File | Device | CPU | Notes |
            |------|--------|-----|-------|
            | `PS-1206U_v8.8.bin` | IOGear PS-1206U | Edimax 8820 (x86) | Original firmware |
            | `GPSU21_modified.bin` | IOGear GPSU21 | MediaTek MT7688 (MIPS) | Built from `gpsu21_web/` sources in this commit |

            > ⚠️ **These firmware images are NOT interchangeable.**
            > Flashing PS-1206U firmware onto a GPSU21 (or vice versa) will brick the device.
            > See [COMPATIBILITY.md](https://github.com/${{ github.repository }}/blob/main/COMPATIBILITY.md) for details.

            Built from commit ${{ github.sha }}.
          files: |
            PS-1206U_v8.8.bin
            GPSU21_modified.bin
          fail_on_unmatched_files: true
