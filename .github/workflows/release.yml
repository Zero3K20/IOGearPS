name: Release Firmware

"on":
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Build GPSU21 firmware from eCos source
    runs-on: ubuntu-latest

    env:
      # MIPS little-endian cross-toolchain prefix
      CROSS_COMPILE: mipsel-linux-gnu-
      # Output firmware image path
      FW_OUT: firmware/build/gpsu21_ecos.bin
      # Base URL for the official eCos 3.0 release directory — contains the
      # complete package tree (including net/lwip_tcpip / CYGPKG_NET_LWIP)
      # plus host tools source.
      ECOS_RELEASE_URL: "https://mirror.aarnet.edu.au/pub/sourceware/ecos/releases/ecos-3.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # ── Toolchain & build prerequisites ──────────────────────────────────
      - name: Install MIPS cross-compiler and eCos build prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-mipsel-linux-gnu \
            g++-mipsel-linux-gnu \
            binutils-mipsel-linux-gnu \
            tcl \
            tcl-dev \
            tk \
            tk-dev \
            autoconf \
            automake \
            libtool

      # ── MIPS soft-float stub header ──────────────────────────────────────────
      # Ubuntu's gcc-mipsel-linux-gnu cross-toolchain uses -msoft-float for the
      # eCos build.  The Linux sysroot headers (features.h → gnu/stubs.h) then
      # require gnu/stubs-o32_soft.h for the o32 soft-float ABI, but
      # libc6-dev-mipsel-cross only ships the hard-float variant
      # (gnu/stubs-o32.h).  Create the missing stub so the header chain
      # compiles cleanly.  For bare-metal eCos builds the symbol stubs are
      # unused; only the file's existence matters.
      - name: Create missing MIPS o32 soft-float stub header
        run: |
          STUBS_DIR="/usr/mipsel-linux-gnu/include/gnu"
          STUBS_FILE="$STUBS_DIR/stubs-o32_soft.h"
          if [ ! -f "$STUBS_FILE" ]; then
            sudo mkdir -p "$STUBS_DIR"
            printf '/* Stub for MIPS o32 soft-float ABI.\n   Not used in bare-metal / eCos builds; exists only to satisfy the\n   features.h -> gnu/stubs.h include chain when -msoft-float is active. */\n' \
              | sudo tee "$STUBS_FILE" > /dev/null
            echo "Created $STUBS_FILE"
          else
            echo "$STUBS_FILE already exists, skipping."
          fi

      # ── eCos source ───────────────────────────────────────────────────────
      # The official eCos 3.0 release tarball is used instead of the GitHub
      # mirror because it contains the complete package tree, including
      # net/lwip_tcpip (CYGPKG_NET_LWIP) and all other packages referenced in
      # firmware/ecos.ecc.  The cache key is fixed to the release version since
      # the tarball is immutable; no monthly bust token is required.
      - name: Cache eCos source tree
        id: ecos-src-cache
        uses: actions/cache@v4
        with:
          path: ecos-3.0
          key: ecos-src-ecos-3.0-aarnet-v2

      - name: Download official eCos 3.0 release from aarnet mirror
        if: steps.ecos-src-cache.outputs.cache-hit != 'true'
        run: |
          # Download tarball with its canonical filename for checksum verification.
          curl -fL "${ECOS_RELEASE_URL}/ecos-3.0.i386linux.tar.bz2" \
            -o /tmp/ecos-3.0.i386linux.tar.bz2
          # Verify integrity against the mirror's published SHA-512 checksum.
          curl -fL "${ECOS_RELEASE_URL}/sha512.sum" \
            | grep "ecos-3.0.i386linux.tar.bz2" \
            | (cd /tmp && sha512sum --check)
          # Extract the tarball; it unpacks into an ecos-3.0/ subdirectory.
          tar -xjf /tmp/ecos-3.0.i386linux.tar.bz2
          rm /tmp/ecos-3.0.i386linux.tar.bz2

      # ── ecosconfig host tool ──────────────────────────────────────────────
      # The eCos 3.0 i386linux tarball includes the host tools source tree
      # (ecos-3.0/configure), so ecosconfig is still built from source.
      # Cache key is fixed to the eCos 3.0 release.
      - name: Cache ecosconfig host tool
        id: ecosconfig-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/ecos-host
          key: ecosconfig-${{ runner.os }}-ecos-3.0-aarnet-v2

      - name: Build ecosconfig host tool
        if: steps.ecosconfig-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$RUNNER_TEMP/ecos-host"
          mkdir -p "$RUNNER_TEMP/ecos-host-build"
          cd "$RUNNER_TEMP/ecos-host-build"
          "$GITHUB_WORKSPACE/ecos-3.0/configure" --prefix="$RUNNER_TEMP/ecos-host"
          make -j1
          sudo make install

      - name: Add ecosconfig to PATH
        run: echo "$RUNNER_TEMP/ecos-host/bin" >> "$GITHUB_PATH"

      # ── eCos kernel build ─────────────────────────────────────────────────
      # Export only the mainline eCos packages path here.  The firmware/hal/
      # directory (MT7688 platform HAL) is appended automatically by the
      # firmware/Makefile via: export ECOS_REPOSITORY := $(ECOS_REPOSITORY):$(HAL_DIR)
      # Setting it here too would double-append firmware/hal and could cause
      # ecosconfig to register packages from that directory twice.
      - name: Set ECOS_REPOSITORY
        run: |
          echo "ECOS_REPOSITORY=$GITHUB_WORKSPACE/ecos-3.0/packages" \
            >> "$GITHUB_ENV"

      # ── Patch eCos source for lwIP compatibility ───────────────────────────
      # The eCos 3.0 io/eth package compiles stand_alone/eth_drv.c even when
      # a full network stack (CYGPKG_NET_LWIP) is configured.  The file's
      # eth_drv.h defines 'struct arpcom' twice when BOTH
      # CYGPKG_IO_ETH_DRIVERS_STAND_ALONE and CYGPKG_NET_LWIP are set:
      # once for standalone use (with .esa) and once for lwIP (without .esa).
      # This causes a "redefinition of struct arpcom" build error.
      #
      # Fix 1: Guard the STAND_ALONE definition in eth_drv.h so it is skipped
      #         when lwIP is present.
      # Fix 2: Guard stand_alone/eth_drv.c so the file is a no-op when lwIP is
      #         configured (it uses .esa which doesn't exist in the lwIP struct).
      #
      # Both patches are idempotent — on subsequent runs with a cached eCos
      # source tree the patterns no longer match and sed makes no change.
      - name: Patch eCos io/eth for lwIP + standalone driver coexistence
        run: |
          ETH_HDR="ecos-3.0/packages/io/eth/v3_0/include/eth_drv.h"
          ETH_SA="ecos-3.0/packages/io/eth/v3_0/src/stand_alone/eth_drv.c"

          # Fix 1: make the STAND_ALONE struct arpcom conditional on !LWIP.
          # The \&\& in the sed replacement string is an escaped && (the & would
          # otherwise refer to the matched text in sed replacement syntax).
          sed -i \
            's/^#ifdef CYGPKG_IO_ETH_DRIVERS_STAND_ALONE$/#if defined(CYGPKG_IO_ETH_DRIVERS_STAND_ALONE) \&\& !defined(CYGPKG_NET_LWIP)/' \
            "$ETH_HDR"

          # Fix 2: wrap stand_alone/eth_drv.c in a !CYGPKG_NET_LWIP guard so
          # it compiles to an empty translation unit when lwIP is configured.
          if ! grep -q 'CYGPKG_NET_LWIP' "$ETH_SA"; then
            FIRST_PP=$(grep -n '^#' "$ETH_SA" | head -1 | cut -d: -f1)
            if [ -z "$FIRST_PP" ]; then
              echo "ERROR: no preprocessor directive found in $ETH_SA" >&2
              exit 1
            fi
            awk -v pp="$FIRST_PP" \
              'NR==pp{print "#include <pkgconf/system.h>"; print "#ifndef CYGPKG_NET_LWIP"}1' \
              "$ETH_SA" > /tmp/eth_sa.tmp && mv /tmp/eth_sa.tmp "$ETH_SA"
            printf '\n#endif /* !CYGPKG_NET_LWIP */\n' >> "$ETH_SA"
            echo "Patched $ETH_SA"
          else
            echo "$ETH_SA already patched, skipping."
          fi

      - name: Cache eCos kernel build
        id: ecos-kernel-cache
        uses: actions/cache@v4
        with:
          path: firmware/ecos_build
          key: ecos-kernel-${{ runner.os }}-${{ hashFiles('firmware/ecos.ecc', 'firmware/hal/**') }}

      - name: Configure and build eCos kernel library
        if: steps.ecos-kernel-cache.outputs.cache-hit != 'true'
        run: |
          make -C firmware ecos-build \
            CROSS_COMPILE="$CROSS_COMPILE"

      # ── Application + firmware image ──────────────────────────────────────
      - name: Build application and package firmware
        run: |
          make -C firmware app-build firmware \
            CROSS_COMPILE="$CROSS_COMPILE"

      # ── Verification ──────────────────────────────────────────────────────
      - name: Verify firmware image structure and checksums
        run: |
          python3 - <<'PYEOF'
          import struct, zlib, lzma, sys, os

          fw_path = os.environ["FW_OUT"]
          with open(fw_path, "rb") as f:
              fw = f.read()

          # ZOT header magic
          magic = struct.unpack_from("<I", fw, 4)[0]
          assert magic == 0x68617964, f"Bad ZOT magic: {magic:#010x}"

          # U-Boot uImage magic
          uimage_magic = struct.unpack_from(">I", fw, 0x100)[0]
          assert uimage_magic == 0x27051956, f"Bad uImage magic: {uimage_magic:#010x}"

          # ZOT header checksum: ~CRC32(fw[4:])
          stored  = struct.unpack_from("<I", fw, 0)[0]
          computed = zlib.crc32(fw[4:]) ^ 0xFFFFFFFF
          assert stored == computed & 0xFFFFFFFF, \
              f"ZOT CRC mismatch: stored={stored:#010x} computed={computed & 0xFFFFFFFF:#010x}"

          # uImage header CRC
          hdr = bytearray(fw[0x100:0x140])
          stored_hcrc = struct.unpack_from(">I", hdr, 4)[0]
          struct.pack_into(">I", hdr, 4, 0)
          computed_hcrc = zlib.crc32(bytes(hdr)) & 0xFFFFFFFF
          assert stored_hcrc == computed_hcrc, \
              f"uImage header CRC mismatch: stored={stored_hcrc:#010x} computed={computed_hcrc:#010x}"

          # Firmware version string
          ver = fw[0x28:0x5b].rstrip(b"\x00").decode("latin-1")
          assert ver.startswith("MT7688-"), f"Unexpected version string: {ver!r}"

          # LZMA payload decompresses
          raw = lzma.decompress(fw[0x4AC0:])

          print(f"OK  {len(fw):,} bytes  version={ver}  decompressed={len(raw):,} bytes")
          PYEOF

      # ── Release ───────────────────────────────────────────────────────────
      - name: Determine release tag
        id: tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DATE="$(date -u +'%Y%m%d')"
          echo "tag=firmware-${DATE}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "name=Firmware build ${DATE} (${SHORT_SHA})" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            ## Firmware release (built from eCos RTOS source)

            | File | Device | CPU | Notes |
            |------|--------|-----|-------|
            | `gpsu21_ecos.bin` | IOGear GPSU21 | MediaTek MT7688 (MIPS) | Compiled from eCos RTOS source; all stability fixes incorporated |

            ### Stability fixes incorporated at source level

            | Fix | Implementation |
            |-----|----------------|
            | mDNS/Bonjour lock counter de-sync | Clean mDNS re-implementation (`firmware/src/mdns.c`) |
            | eCos `wakeup_count` overflow assertion | `CYGNUM_KERNEL_THREADS_WAKEUP_COUNT_MAX = 0` in `firmware/ecos.ecc` |
            | Browser auto-refresh HTTP connection exhaustion | Auto-refresh `<meta>` tags absent from `gpsu21_web/` source HTML |

            Built from commit ${{ github.sha }}.
          files: |
            firmware/build/gpsu21_ecos.bin
          fail_on_unmatched_files: true

